<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Seni Seviyorum</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #ffe6e6;
        }
        h1 {
            color: #ff3366;
            font-size: 48px;
        }
        p {
            font-size: 24px;
        }
        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 20px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #ff6699;
            color: white;
        }
        button:hover {
            background-color: #ff3366;
        }
    </style>
</head>
<body>
    <h1>Seni Seviyorum</h1>
    <p>Beni seviyor musun?</p>
    <button onclick="cevap()">Evet</button>
    <button onclick="cevap()">Hayır</button>

    <script>
        function cevap() {
            alert("Beni sevmek zorundasın!");
        }
    </script>
</body>
</html>
