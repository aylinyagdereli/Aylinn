<!DOCTYPE html>
<html>
<head>
  <title>Öğrenci Otomasyonu</title>
  <meta charset="UTF-8">
  <style>
   
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 50px;
      color: #333;
    }

    
    .container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    
    input[type="text"], input[type="number"] {
      width: calc(100% - 20px);
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      border-color: #3498db;
    }

    button {
      padding: 8px 14px;
      margin-right: 5px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s;
      font-size: 14px;
    }

    button:hover {
      background: #2980b9;
    }

    
    ul#liste {
      list-style: none;
      padding-left: 0;
      margin-top: 20px;
    }

    ul#liste li {
      background: #ecf0f1;
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }

    ul#liste li:hover {
      background: #d0e4f7;
    }

    ul#liste li button {
      margin-left: 5px;
      font-size: 12px;
      padding: 4px 8px;
    }

    /* JSON panel */
    #jsonPanel {
      display: none;
      background: #f4f4f4;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Öğrenci Otomasyonu</h2>

  <input type="text" id="ad" placeholder="Öğrenci Adı">
  <input type="number" id="yas" placeholder="Yaş">
  <div>
    <button onclick="ekle()">Ekle</button>
    <button onclick="jsonGoster()">Veri Yapısını Göster</button>
    <button onclick="veriCek()">Örnek Fetch</button>
  </div>

  <ul id="liste"></ul>

  <pre id="jsonPanel"></pre>
</div>

<script>
class Ogrenci {
  constructor(ad, yas) {
    this.ad = ad;
    this.yas = yas;
  }
}

let ogrenciler = [];

const ekle = () => {
  let ad = document.getElementById("ad").value.trim();
  let yas = document.getElementById("yas").value;

  if(ad === "" || yas === "") {
    alert("Boş bırakma!");
    return;
  }

  const ogrenci = new Ogrenci(
    ad.charAt(0).toUpperCase() + ad.slice(1),
    Number(yas)
  );

  ogrenciler.push(ogrenci);
  listele();
  jsonGuncelle();

  document.getElementById("ad").value = "";
  document.getElementById("yas").value = "";
};

const sil = (index) => {
  ogrenciler.splice(index, 1);
  listele();
  jsonGuncelle();
};

const guncelle = (index) => {
  let yeniAd = prompt("Yeni isim:");
  if(yeniAd?.trim()) {
    ogrenciler[index].ad = yeniAd.trim();
    listele();
    jsonGuncelle();
  }
};

const listele = () => {
  let ul = document.getElementById("liste");
  ul.innerHTML = "";

  ogrenciler.forEach((ogrenci, index) => {
    const { ad, yas } = ogrenci;
    ul.innerHTML += `
      <li>
        <span>${ad} - ${yas} yaş</span>
        <span>
          <button onclick="sil(${index})">Sil</button>
          <button onclick="guncelle(${index})">Güncelle</button>
        </span>
      </li>
    `;
  });
};

const jsonGoster = () => {
  const panel = document.getElementById("jsonPanel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
};

const jsonGuncelle = () => {
  const panel = document.getElementById("jsonPanel");
  panel.textContent = JSON.stringify(ogrenciler, null, 2);
};

const veriCek = async () => {
  try {
    let response = await fetch("https://jsonplaceholder.typicode.com/users/1");
    let data = await response.json();
    const yeniOgrenci = new Ogrenci(data.name, 20);
    ogrenciler.push(yeniOgrenci);
    listele();
    jsonGuncelle();
    alert("API'den bir öğrenci eklendi!");
  } catch (error) {
    alert("Veri alınamadı!");
  }
};
</script>

</body>
</html>
