<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management System</title>

  
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
  
  <style>
  
    :root {
      --primary-color: #4f46e5;
      --bg-color: #f3f4f6;
      --text-main: #1f2937;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      margin: 0;
    }

    .container {
      background: var(--white);
      padding: 2.5rem;
      border-radius: 1.25rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 600px;
    }

    h1 { 
      text-align: center; 
      font-size: 1.75rem; 
      margin-bottom: 0.5rem;
      color: var(--primary-color);
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      transition: border 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .button-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 2rem;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .btn-submit { background: var(--primary-color); color: white; }
    .btn-fetch { background: #10b981; color: white; }
    .btn-debug { background: #6b7280; color: white; }
    
    button:hover { opacity: 0.9; transform: translateY(-1px); }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #f3f4f6;
    }

    th { 
      background-color: #f9fafb; 
      font-weight: 600;
      color: #6b7280;
    }

    #dataPreview {
      background: #1a1b1e;
      color: #a5d6ff;
      padding: 20px;
      border-radius: 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      display: none;
      margin-top: 25px;
      overflow-x: auto;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Öğrenci Kayıt Sistemi</h1>
    <p class="subtitle">Öğrencileri ekle, yönet ve görüntüle</p>
  </header>

  <div class="input-wrapper">
    <input type="text" id="inputName" placeholder="Ad Soyad">
    <input type="number" id="inputAge" placeholder="Yaş">
  </div>

  <div class="button-container">
    <button class="btn-submit" id="addBtn">Ekle</button>
    <button class="btn-fetch" id="fetchBtn">API Verisi</button>
    <button class="btn-debug" id="toggleBtn">Veri Yapısı</button>
  </div>

  <table id="dataTable">
    <thead>
      <tr>
        <th>Öğrenci</th>
        <th>Durum</th>
        <th>Eylem</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <pre id="dataPreview"></pre>
</div>

<script>

  class Student {
    constructor(name, age) {
      this.name = name;
      this.age = age;
      this.id = Date.now();
    }
  }

  let students = [];

  const addBtn = document.getElementById("addBtn");
  const fetchBtn = document.getElementById("fetchBtn");
  const toggleBtn = document.getElementById("toggleBtn");
  const tableBody = document.getElementById("tableBody");

  addBtn.addEventListener("click", () => {
    const nameInput = document.getElementById("inputName");
    const ageInput = document.getElementById("inputAge");

    if (nameInput.value.trim() && ageInput.value) {
      const newStudent = new Student(
        nameInput.value, 
        parseInt(ageInput.value)
      );
      
      students.push(newStudent); 
      clearForm();
      updateDisplay();
    }
  });

  const updateDisplay = () => {
    tableBody.innerHTML = "";
    
    students.forEach((student) => {
      const { name, age, id } = student;
      const status = age >= 18 ? "Yetişkin" : "Öğrenci";
      
      const row = `
        <tr>
          <td>${name.toUpperCase()}</td>
          <td>${status}</td>
          <td>
            <button onclick="removeStudent(${id})" style="color:#ef4444; background:none; padding:0;">Sil</button>
          </td>
        </tr>
      `;
      tableBody.innerHTML += row;
    });

    syncJSON();
  };

  window.removeStudent = (id) => {
    students = students.filter(s => s.id !== id);
    updateDisplay();
  };

  const fetchData = async () => {
    try {
      const response = await fetch('https://jsonplaceholder.typicode.com/users/1');
      const data = await response.json();
      
      const apiStudent = new Student(data.name, 22);
      students.push(apiStudent);
      updateDisplay();
    } catch (error) {
      console.error("Fetch error:", error);
    }
  };

  fetchBtn.addEventListener("click", fetchData);

  const syncJSON = () => {
    document.getElementById("dataPreview").textContent = JSON.stringify(students, null, 2);
  };

  toggleBtn.addEventListener("click", () => {
    const panel = document.getElementById("dataPreview");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  });

  const clearForm = () => {
    document.getElementById("inputName").value = "";
    document.getElementById("inputAge").value = "";
  };

  console.log("System initialized. Version ES2026.");
</script>

</body>
</html>
